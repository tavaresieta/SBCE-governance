  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

amily: 'Lato';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"fd5a5fa5-78b5-450d-93e3-b15fcc081d38\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"d6f94b34-710e-4dcf-8e63-c5e03fa6b9ac\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg: #efefef;\n    --card: #f6f6f7;\n    --plot: #e8e5e5;\n    --navy: #1a184d;\n    --navy2: #232066;\n    --purple: #5c2bc3;\n    --purple2: #6f43c9;\n    --p1: #5c2bc3;\n    --p2: #7d55cf;\n    --p3: #a567ca;\n    --outros: #1a184d;\n    --accent: #5c2bc3;\n    --line-flow: #5c2bc3;\n    --line-fan: #2a2660;\n    --ink: #221f44;\n    --muted: #6f6b80;\n    --line: #cfcbd6;\n  }\n  * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { width: 100%; min-height: 100%; }\n  body {\n    background: var(--bg);\n    font-family: 'Lato', sans-serif;\n    color: var(--ink);\n    display: flex;\n    justify-content: center;\n    padding: 36px 26px 48px;\n  }\n  .card {\n    background: var(--card);\n    border-radius: 8px;\n    box-shadow: 0 2px 26px rgba(20,18,60,0.10);\n    width: 100%;\n    max-width: 1300px;\n    padding: 30px 38px 38px;\n  }\n\n  /* Master header */\n  .masthead { margin-bottom: 26px; }\n  .masthead .accent { width: 116px; height: 7px; background: var(--accent); border-radius: 4px; margin-bottom: 13px; }\n  .masthead h1 {\n    font-size: 28px; font-weight: 900; color: var(--navy); line-height: 1.12;\n  }\n  .masthead p {\n    margin-top: 8px; font-size: 13.5px; line-height: 1.5; color: var(--muted); max-width: 860px;\n  }\n\n  /* Panel framing */\n  .panel-label {\n    display: flex; align-items: center; gap: 12px; margin: 4px 0 18px;\n  }\n  .panel-label .tag {\n    flex: 0 0 auto;\n    font-size: 11px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase;\n    color: #fff; background: var(--navy); padding: 5px 11px; border-radius: 5px; white-space: nowrap;\n  }\n  .panel-label .ttl { flex: 0 0 auto; font-size: 16px; font-weight: 900; color: var(--navy); white-space: nowrap; }\n  .panel-label .rule { flex: 1; height: 1px; background: var(--line); }\n  .panel-divider { height: 0; border-top: 1px dashed #c7c2d4; margin: 38px 0 30px; }\n\n  /* ════════ GOVERNANCE (.gov) ════════ */\n  .gov .stage-wrap { position: relative; width: 100%; }\n  .gov .stage { position: absolute; top: 0; left: 0; width: 1280px; height: 655px; transform-origin: 0 0; }\n  .gov svg.links { position: absolute; inset: 0; width: 1280px; height: 655px; overflow: visible; }\n  .gov .box {\n    position: absolute; border-radius: 15px; color: #fff;\n    padding: 13px 18px; text-align: center;\n    display: flex; flex-direction: column; justify-content: center;\n    box-shadow: 0 5px 14px rgba(26,24,77,0.18);\n  }\n  .gov .box.navy { background: var(--navy); }\n  .gov .box.purple { background: var(--purple); }\n  .gov .box h3 { font-size: 16px; font-weight: 900; line-height: 1.22; margin-bottom: 7px; }\n  .gov .box p { font-size: 12.5px; font-weight: 400; line-height: 1.42; }\n  .gov .box p.list { text-align: center; }\n  .gov .legend {\n    position: absolute; right: 12px; bottom: 2px;\n    display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--ink);\n  }\n  .gov .legend .ln { width: 40px; height: 0; border-top: 1.5px solid var(--line-fan); }\n\n  /* ════════ COVERAGE (.cov) ════════ */\n  .cov .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 28px; }\n  .cov .align-note {\n    flex: 0 0 auto; text-align: center; color: var(--navy);\n    font-size: 12px; font-weight: 700; line-height: 1.35; padding-top: 2px;\n  }\n  .cov .align-note .arrow { font-size: 26px; line-height: 1; color: var(--accent); display: block; margin-top: 4px; }\n  .cov .lead { font-size: 13.5px; line-height: 1.5; color: var(--muted); max-width: 760px; }\n  .cov .lead em { font-style: italic; }\n\n  .cov .sec-head { display: flex; align-items: baseline; gap: 12px; margin: 28px 0 16px; }\n  .cov .sec-head h2 {\n    font-size: 13px; font-weight: 900; letter-spacing: 0.14em; text-transform: uppercase; color: var(--navy);\n  }\n  .cov .sec-head .rule { flex: 1; height: 1px; background: var(--line); }\n  .cov .sec-head .hint { font-size: 12px; color: var(--muted); font-weight: 400; }\n\n  .cov .criteria { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }\n  .cov .crit {\n    background: #fff; border: 1px solid #e4e1ec; border-radius: 8px;\n    padding: 14px 16px 15px; position: relative; overflow: hidden;\n  }\n  .cov .crit::before { content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background: var(--cc); }\n  .cov .crit .rank { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .04em; }\n  .cov .crit .name { font-size: 15px; font-weight: 900; color: var(--navy); margin: 3px 0 9px; line-height: 1.2; }\n  .cov .crit .wrap { display: flex; align-items: center; gap: 10px; }\n  .cov .crit .track { flex: 1; height: 8px; background: #ece9f3; border-radius: 5px; overflow: hidden; }\n  .cov .crit .fill { height: 100%; background: var(--cc); border-radius: 5px; }\n  .cov .crit .pct { font-size: 16px; font-weight: 900; color: var(--cc); min-width: 42px; text-align: right; }\n  .cov .crit .desc { margin-top: 9px; font-size: 11.5px; line-height: 1.45; color: var(--muted); }\n  .cov .secondary {\n    margin-top: 13px; font-size: 11.5px; line-height: 1.5; color: var(--muted);\n    background: #efedf4; border-radius: 7px; padding: 10px 14px;\n  }\n  .cov .secondary b { color: var(--navy); font-weight: 700; }\n\n  .cov .timeline { position: relative; margin-top: 8px; }\n  .cov .guides { position: absolute; inset: 38px 0 34px 0; pointer-events: none; }\n  .cov .guides .g { position: absolute; top: 0; bottom: 0; width: 0; border-left: 1.5px dashed #c7c2d4; }\n  .cov .axis { position: relative; height: 38px; }\n  .cov .axis .baseline { position: absolute; left: 0; right: 0; top: 28px; height: 2px; background: var(--navy); }\n  .cov .tick { position: absolute; top: 0; transform: translateX(-50%); text-align: center; }\n  .cov .tick .yr { font-size: 13px; font-weight: 700; color: var(--muted); }\n  .cov .tick.mile .yr { color: var(--p1); font-weight: 900; }\n  .cov .tick .stem { width: 2px; height: 9px; background: var(--navy); margin: 4px auto 0; }\n  .cov .tick .dot {\n    width: 15px; height: 15px; border-radius: 50%; background: var(--p1);\n    border: 2.5px solid #fff; box-shadow: 0 0 0 1.5px var(--p1); margin: 1px auto 0;\n  }\n  .cov .stage { position: relative; margin-top: 14px; }\n  .cov .stage .hd {\n    color: #fff; font-weight: 900; font-size: 14px; letter-spacing: .03em;\n    text-align: center; padding: 7px 10px; border-radius: 7px 7px 0 0;\n  }\n  .cov .stage .body {\n    background: #fff; border: 1.5px solid var(--bd); border-top: none;\n    border-radius: 0 0 8px 8px; padding: 12px 16px 14px;\n  }\n  .cov .stage ul { list-style: none; display: flex; flex-direction: column; gap: 3px; }\n  .cov .stage li { font-size: 13px; text-align: center; color: var(--ink); line-height: 1.35; }\n  .cov .outros {\n    margin-top: 16px; background: var(--outros); color: #fff; font-weight: 900;\n    font-size: 13.5px; letter-spacing: .04em; text-align: center; padding: 9px; border-radius: 7px;\n  }\n  .cov .outros small { display:block; font-weight:400; font-size: 11px; opacity: .92; margin-top: 2px; letter-spacing: 0; }\n\n  .cov .phasing { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }\n  .cov .yp {\n    background: #fff; border: 1px solid #e4e1ec; border-radius: 8px; padding: 14px 16px;\n    display: flex; gap: 13px; align-items: flex-start;\n  }\n  .cov .yp .num {\n    flex: 0 0 auto; min-width: 44px; height: 38px; padding: 0 8px; border-radius: 19px;\n    background: var(--navy); color: #fff; font-weight: 900; font-size: 12px;\n    display: flex; align-items: center; justify-content: center; line-height: 1.05; text-align:center;\n  }\n  .cov .yp .t { font-size: 14px; font-weight: 900; color: var(--navy); margin-bottom: 3px; }\n  .cov .yp .d { font-size: 11.5px; line-height: 1.45; color: var(--muted); }\n  .cov .phasing-note { margin-top: 11px; font-size: 11.5px; color: var(--muted); line-height: 1.5; }\n\n  .cov .legend {\n    margin-top: 24px; display: flex; flex-wrap: wrap; gap: 8px 22px; align-items: center;\n    border-top: 1px solid var(--line); padding-top: 16px;\n  }\n  .cov .legend .li { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink); }\n  .cov .legend .sw { width: 26px; height: 12px; border-radius: 3px; }\n  .cov .legend .dotmk { width: 13px; height: 13px; border-radius: 50%; background: var(--p1); box-shadow: 0 0 0 1.5px var(--p1), inset 0 0 0 2px #fff; }\n  .cov .source { margin-top: 14px; font-size: 11px; color: var(--muted); line-height: 1.5; }\n  .cov .source b { color: var(--navy); font-weight: 700; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n\n  <div class=\"card\">\n\n    <!-- Master header -->\n    <div class=\"masthead\">\n      <div class=\"accent\"><\u002Fdiv>\n      <h1>Brazilian Emissions Trading System (SBCE)<\u002Fh1>\n      <p>Institutional governance and the phased sectoral coverage of the Brazilian MRV Program (PB-MRV).<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ══════════ PANEL 1 · GOVERNANCE ══════════ -->\n    <div class=\"panel-label\">\n      <span class=\"tag\">01 · Governance<\u002Fspan>\n      <span class=\"ttl\">Institutional Governance Structure<\u002Fspan>\n      <span class=\"rule\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"panel gov\">\n      <div class=\"stage-wrap\" id=\"wrap\">\n        <div class=\"stage\" id=\"stage\">\n          <svg class=\"links\" id=\"links\" viewBox=\"0 0 1280 655\"><\u002Fsvg>\n\n          <!-- LEFT COLUMN -->\n          <div class=\"box navy\" style=\"left:150px; top:30px; width:320px; height:120px;\">\n            <h3>Interministerial Committee on Climate Change – CIM<\u002Fh3>\n            <p>Guidelines for the SBCE, approval of the National Allocation Plan (PNA), conditions for the authorization of ITMOs, among others.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"box navy\" style=\"left:150px; top:175px; width:320px; height:150px;\">\n            <h3>Managing Body<\u002Fh3>\n            <p>Definition of regulated entities; proposal of the NAPs; accreditation of methodologies for generating CRVEs; definition of CRVE limits in periodic cycles; definition of MRV requirements and procedures; management of the SBCE Central Registry, among others.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"box purple\" style=\"left:150px; top:350px; width:320px; height:115px;\">\n            <h3>Permanent Technical Advisory Committee<\u002Fh3>\n            <p>Recommendations on NAP criteria, accreditation of methodologies for generating offsets, and allocation of resources from SBCE revenues.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"box purple\" style=\"left:28px; top:493px; width:275px; height:150px;\">\n            <h3>Technical Working Groups (GTs)<\u002Fh3>\n            <p class=\"list\" style=\"font-size:12px;\">(1) Accreditation and De-accreditation of Methodologies for CRVEs Generation; (2) MRV of Emissions; (3) Financial Aspects of the SBCE.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"box purple\" style=\"left:330px; top:493px; width:320px; height:150px;\">\n            <h3>Regulatory Affairs Chambers (CAREGs)<\u002Fh3>\n            <p>Composed of representative entities from regulated sectors. Consultation on the PNA, emissions cap, MRV, and others.<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- RIGHT COLUMN -->\n          <div class=\"box navy\" style=\"left:820px; top:30px; width:320px; height:125px;\">\n            <h3>Designated National Authority<\u002Fh3>\n            <p>Authorization for the international transfer of mitigation outcomes (ITMOs) for the purposes of Article 6 of the Paris Agreement.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"box navy\" style=\"left:820px; top:175px; width:320px; height:120px;\">\n            <h3>National REDD+ Commission – CONAREDD+ <span style=\"font-weight:700;\">(now under DIMER)<\u002Fspan><\u002Fh3>\n            <p>Criteria for accrediting methodologies for generating offsets; information on REDD+ projects and programs; avoidance of double counting.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"box navy\" style=\"left:820px; top:313px; width:320px; height:130px;\">\n            <h3>Securities and Exchange Commission (CVM)<\u002Fh3>\n            <p>Responsible for regulating the trading of SBCE assets on financial and capital markets. CVM is also granted powers to regulate the use of financial products other than SBCE securities.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"box navy\" style=\"left:820px; top:460px; width:320px; height:155px;\">\n            <h3>National Agency of Petroleum, Natural Gas and Biofuels (ANP)<\u002Fh3>\n            <p>Responsible for specifying biofuels and regulating all CCS activities, classifiable as emission reductions or removals and potential carbon sinks under the SBCE. All CCS stages require ANP authorization.<\u002Fp>\n          <\u002Fdiv>\n\n          <div class=\"legend\"><span class=\"ln\"><\u002Fspan>Information flows and collaboration between entities<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div class=\"panel-divider\"><\u002Fdiv>\n\n    <!-- ══════════ PANEL 2 · COVERAGE ══════════ -->\n    <div class=\"panel-label\">\n      <span class=\"tag\">02 · Rollout<\u002Fspan>\n      <span class=\"ttl\">PB-MRV — Initial Sectoral Coverage Proposal<\u002Fspan>\n      <span class=\"rule\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <section class=\"panel cov\">\n      <div class=\"topbar\">\n        <p class=\"lead\">Distribution of economic sectors across the three implementation stages of the Brazilian MRV Program (PB-MRV), as presented at the 2nd meeting of the <em>Permanent Technical Advisory Committee (CTCP)<\u002Fem>.<\u002Fp>\n        <div class=\"align-note\">\n          Temporal alignment<br>with the Climate Plan<br>(2024–2035)\n          <span class=\"arrow\">↓<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Criteria -->\n      <div class=\"sec-head\">\n        <h2>Sector prioritization criteria<\u002Fh2>\n        <div class=\"rule\"><\u002Fdiv>\n        <span class=\"hint\">Weights applied in the multicriteria matrix<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"criteria\">\n        <div class=\"crit\" style=\"--cc:#1a184d\">\n          <div class=\"rank\">1st criterion<\u002Fdiv>\n          <div class=\"name\">MRV Feasibility<\u002Fdiv>\n          <div class=\"wrap\"><div class=\"track\"><div class=\"fill\" style=\"width:50%\"><\u002Fdiv><\u002Fdiv><div class=\"pct\">50%<\u002Fdiv><\u002Fdiv>\n          <div class=\"desc\">Technical capacity to measure, report and verify emissions using already-consolidated methodologies.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"crit\" style=\"--cc:#5c2bc3\">\n          <div class=\"rank\">2nd criterion<\u002Fdiv>\n          <div class=\"name\">Market Structure<\u002Fdiv>\n          <div class=\"wrap\"><div class=\"track\"><div class=\"fill\" style=\"width:30%\"><\u002Fdiv><\u002Fdiv><div class=\"pct\">30%<\u002Fdiv><\u002Fdiv>\n          <div class=\"desc\">Degree of sector concentration — more concentrated markets lower supervision costs.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"crit\" style=\"--cc:#7d55cf\">\n          <div class=\"rank\">3rd criterion<\u002Fdiv>\n          <div class=\"name\">Energy &amp; Emissions Intensity<\u002Fdiv>\n          <div class=\"wrap\"><div class=\"track\"><div class=\"fill\" style=\"width:20%\"><\u002Fdiv><\u002Fdiv><div class=\"pct\">20%<\u002Fdiv><\u002Fdiv>\n          <div class=\"desc\">Absolute and relative level of emissions and energy use of productive activities.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"secondary\"><b>Complementary criteria<\u002Fb>, reserved for later stages of SBCE operationalization (National Allocation Plan): Regulatory &amp; Institutional Structure · Macroeconomic Impacts · International Trade Exposure.<\u002Fp>\n\n      <!-- Timeline -->\n      <div class=\"sec-head\">\n        <h2>Stage entry schedule<\u002Fh2>\n        <div class=\"rule\"><\u002Fdiv>\n        <span class=\"hint\">Markers indicate implementation milestones<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"timeline\" id=\"timeline\">\n        <div class=\"guides\" id=\"guides\"><\u002Fdiv>\n        <div class=\"axis\" id=\"axis\"><div class=\"baseline\"><\u002Fdiv><\u002Fdiv>\n\n        <div class=\"stage\" data-start=\"2027\" data-end=\"2031.4\" style=\"--bd:#cdbdf0\">\n          <div class=\"hd\" style=\"background:var(--p1)\">Stage 1 · from 2027<\u002Fdiv>\n          <div class=\"body\">\n            <ul>\n              <li>Iron &amp; Steel<\u002Fli>\n              <li>Cement<\u002Fli>\n              <li>Aluminum (primary)<\u002Fli>\n              <li>E&amp;P and Refining<\u002Fli>\n              <li>Air Transport<\u002Fli>\n              <li>Pulp &amp; Paper<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"stage\" data-start=\"2029\" data-end=\"2033.4\" style=\"--bd:#d4c4ec\">\n          <div class=\"hd\" style=\"background:var(--p2)\">Stage 2 · from 2029<\u002Fdiv>\n          <div class=\"body\">\n            <ul>\n              <li>Chemicals<\u002Fli>\n              <li>Power Sector<\u002Fli>\n              <li>Mining<\u002Fli>\n              <li>Glass<\u002Fli>\n              <li>Ceramics<\u002Fli>\n              <li>Waste<\u002Fli>\n              <li>Aluminum (recycled)<\u002Fli>\n              <li>Food &amp; Beverage Industry<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"stage\" data-start=\"2031\" data-end=\"2034.2\" style=\"--bd:#decbec\">\n          <div class=\"hd\" style=\"background:var(--p3)\">Stage 3 · from 2031<\u002Fdiv>\n          <div class=\"body\">\n            <ul>\n              <li>Road Transport<\u002Fli>\n              <li>Waterway Transport<\u002Fli>\n              <li>Rail Transport<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"outros\">Other sectors\n          <small>Progressive incorporation as MRV capacities mature<\u002Fsmall>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Phasing logic -->\n      <div class=\"sec-head\">\n        <h2>Phased implementation logic<\u002Fh2>\n        <div class=\"rule\"><\u002Fdiv>\n        <span class=\"hint\">Purpose of each year within a stage<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"phasing\">\n        <div class=\"yp\">\n          <div class=\"num\">Year 1<\u002Fdiv>\n          <div><div class=\"t\">Monitoring plans<\u002Fdiv><div class=\"d\">Development and approval of regulated operators' emissions monitoring plans.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"yp\">\n          <div class=\"num\">Years 2 &amp; 3<\u002Fdiv>\n          <div><div class=\"t\">Monitoring &amp; data collection<\u002Fdiv><div class=\"d\">Structured collection of activity data and GHG emissions across two monitoring years.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"yp\">\n          <div class=\"num\">Year 4<\u002Fdiv>\n          <div><div class=\"t\">Reporting &amp; verification<\u002Fdiv><div class=\"d\">Emissions reporting and third-party verification, consolidating the PB-MRV database.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"phasing-note\">The phased rollout ensures predictability, legal certainty and adequate time for institutional and operational capacities to mature before each stage's obligations begin.<\u002Fp>\n\n      <!-- Footer legend -->\n      <div class=\"legend\">\n        <div class=\"li\"><span class=\"sw\" style=\"background:#5c2bc3\"><\u002Fspan>Stage 1<\u002Fdiv>\n        <div class=\"li\"><span class=\"sw\" style=\"background:#7d55cf\"><\u002Fspan>Stage 2<\u002Fdiv>\n        <div class=\"li\"><span class=\"sw\" style=\"background:#a567ca\"><\u002Fspan>Stage 3<\u002Fdiv>\n        <div class=\"li\"><span class=\"sw\" style=\"background:#1a184d\"><\u002Fspan>Other sectors<\u002Fdiv>\n        <div class=\"li\"><span class=\"dotmk\"><\u002Fspan>Implementation milestone<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"source\"><b>Source:<\u002Fb> prepared from the SEMC/MF Information Note — “Criteria and analytical method for PB-MRV sectoral allocation” (May 19, 2026). Sectoral distribution based on the multicriteria matrix (MRV Feasibility, Market Structure, and Energy &amp; Emissions Intensity).<\u002Fp>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n<script>\n/* ── Governance connectors ── */\n(function () {\n  const svg = document.getElementById('links');\n  const NS = 'http://www.w3.org/2000/svg';\n  const el = (n, a) => { const e = document.createElementNS(NS, n); for (const k in a) e.setAttribute(k, a[k]); return e; };\n\n  const stageH = 655;\n  const H = [470, 250];   // hub = right-mid of Managing Body\n\n  const flow = [\n    [[310, 150], [310, 175]],\n    [[310, 325], [310, 350]],\n    [[310, 465], [310, 480]],\n    [[165, 480], [490, 480]],\n    [[165, 480], [165, 493]],\n    [[490, 480], [490, 493]],\n  ];\n  flow.forEach(([a, b]) => svg.appendChild(el('line', {\n    x1: a[0], y1: a[1], x2: b[0], y2: b[1],\n    stroke: 'var(--line-flow)', 'stroke-width': 1.6, 'stroke-linecap': 'round',\n  })));\n\n  const conns = [\n    { a: [470, 90],  b: [820, 85],  lines: ['Conditions and criteria for ITMOs'] },\n    { a: H, b: [820, 130], lines: ['Information flows on ITMOs and CRVEs'] },\n    { a: H, b: [820, 235], lines: ['Collaboration for accreditation of', 'forestry CRVE methodologies'] },\n    { a: H, b: [820, 378], lines: ['Coordinated oversight of SBCE asset', 'trading in financial markets'] },\n    { a: H, b: [820, 535], lines: ['Regulatory authorizations and technical data on', 'biofuels and CCS activities'] },\n  ];\n  conns.forEach(c => {\n    svg.appendChild(el('line', {\n      x1: c.a[0], y1: c.a[1], x2: c.b[0], y2: c.b[1],\n      stroke: 'var(--line-fan)', 'stroke-width': 1.1,\n    }));\n    const mx = (c.a[0] + c.b[0]) / 2, my = (c.a[1] + c.b[1]) / 2;\n    const ang = Math.atan2(c.b[1] - c.a[1], c.b[0] - c.a[0]) * 180 / Math.PI;\n    const g = el('text', {\n      transform: `rotate(${ang} ${mx} ${my})`,\n      x: mx, y: my, 'text-anchor': 'middle',\n      'font-family': 'Lato', 'font-size': 12.5, 'font-weight': 600, fill: '#1a184d',\n      'paint-order': 'stroke', stroke: '#f6f6f7', 'stroke-width': 3.2, 'stroke-linejoin': 'round',\n    });\n    const n = c.lines.length;\n    const startDy = -((n - 1) * 15) / 2 - 6;\n    c.lines.forEach((ln, i) => {\n      const ts = el('tspan', { x: mx, y: my, dy: startDy + i * 15 });\n      ts.textContent = ln;\n      g.appendChild(ts);\n    });\n    svg.appendChild(g);\n  });\n\n  function fit() {\n    const wrap = document.getElementById('wrap');\n    const stage = document.getElementById('stage');\n    const scale = wrap.clientWidth / 1280;\n    stage.style.transform = 'scale(' + scale + ')';\n    wrap.style.height = (stageH * scale) + 'px';\n  }\n  window.addEventListener('resize', fit);\n  if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);\n  fit();\n})();\n\n/* ── Coverage timeline ── */\n(function () {\n  const A0 = 2027, A1 = 2035, PADL = 3.5, PADR = 3.5;\n  const xp = y => PADL + (y - A0) / (A1 - A0) * (100 - PADL - PADR);\n\n  const axis = document.getElementById('axis');\n  const miles = new Set([2027, 2029, 2031, 2034]);\n  for (let y = A0; y <= A1; y++) {\n    const t = document.createElement('div');\n    t.className = 'tick' + (miles.has(y) ? ' mile' : '');\n    t.style.left = xp(y) + '%';\n    t.innerHTML = '<div class=\"yr\">' + y + '<\u002Fdiv>' +\n      (miles.has(y) ? '<div class=\"dot\"><\u002Fdiv>' : '<div class=\"stem\"><\u002Fdiv>');\n    axis.appendChild(t);\n  }\n\n  const guides = document.getElementById('guides');\n  [2029, 2031, 2034].forEach(y => {\n    const g = document.createElement('div');\n    g.className = 'g';\n    g.style.left = xp(y) + '%';\n    guides.appendChild(g);\n  });\n\n  document.querySelectorAll('.cov .stage').forEach(s => {\n    const a = parseFloat(s.dataset.start), b = parseFloat(s.dataset.end);\n    s.style.marginLeft = xp(a) + '%';\n    s.style.width = (xp(b) - xp(a)) + '%';\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
